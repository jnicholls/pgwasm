[workspace]
resolver = "3"
members = [
    "pg_wasm",
    "pg_wasm_macos_test_stub",
]

[workspace.package]
authors = ["Jarred Nicholls <jarred.nicholls@gmail.com>"]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
cc = "1.2"
anyhow = "1"
extism = "1.21.0"
serde_json = "1"
thiserror = "2"
pgrx = "=0.17.0"
pgrx-tests = "=0.17.0"
wasmparser = "0.245"
wasmtime = { version = "43", default-features = false, features = [
    "async",
    "component-model",
    "cranelift",
    "runtime",
] }
wasmtime-wasi = { version = "43", default-features = false, features = [
    "p1",
    "p2",
] }
wat = "1"

[profile.dev]
panic = "unwind"

[profile.release]
panic = "unwind"
opt-level = 3
lto = "fat"
codegen-units = 1
