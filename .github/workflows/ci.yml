name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust (fmt, check, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace

      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test
        run: cargo test --workspace

  pgrx:
    name: pgrx (pg17 tests + regress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install OS and PostgreSQL 17 build deps
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            clang \
            curl \
            git \
            gnupg \
            libssl-dev \
            lsb-release \
            pkg-config
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-server-dev-17
          # pgrx installs the extension into PG's share/lib dirs (root-owned on runners).
          sudo mkdir -p /usr/share/postgresql/17/extension /usr/lib/postgresql/17/lib
          sudo chown -R "$(id -un):$(id -gn)" \
            /usr/share/postgresql/17/extension \
            /usr/lib/postgresql/17/lib

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --locked --version 0.18.0

      - name: pgrx init (PG17)
        run: cargo pgrx init --pg17 /usr/lib/postgresql/17/bin/pg_config

      - name: cargo pgrx test
        working-directory: pg_wasm
        run: cargo pgrx test pg17 -p pg_wasm

      - name: cargo pgrx regress
        working-directory: pg_wasm
        run: cargo pgrx regress pg17 --resetdb -p pg_wasm
